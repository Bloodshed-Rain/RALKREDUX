<!--
  RALB email sign-in template — CODE FIRST, NO TAPPABLE LINK.

  The app verifies email sign-in with the 6-digit OTP ({{ .Token }}) via
  supabase.auth.verifyOtp({ type: 'email' }). The Supabase client runs with
  detectSessionInUrl:false and the native app does NOT consume magic-link
  redirects, so a {{ .ConfirmationURL }} link in this email is a dead end:
  on a phone it lands on the project Site URL (e.g. http://localhost:3000)
  and shows "This site can't be reached / ERR_CONNECTION_REFUSED".

  Therefore this template deliberately OMITS the confirmation URL and shows
  only the code. Paste this into the Supabase dashboard:
    Authentication -> Emails -> Magic Link  (and Confirm signup, if used).
-->
<div style="font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; max-width: 420px; margin: 0 auto; padding: 24px; color: #11181c;">
  <h2 style="margin: 0 0 8px; font-size: 20px;">Your RALB sign-in code</h2>
  <p style="margin: 0 0 20px; font-size: 14px; line-height: 20px; color: #4a5568;">
    Enter this code in the app to finish signing in. Do not share it with anyone.
  </p>
  <div style="font-size: 32px; font-weight: 700; letter-spacing: 6px; text-align: center; padding: 16px; background: #f1f5f9; border-radius: 12px; font-family: 'SFMono-Regular', Menlo, Consolas, monospace;">
    {{ .Token }}
  </div>
  <p style="margin: 20px 0 0; font-size: 13px; line-height: 19px; color: #718096;">
    Type this code into the RALB app — there is no link to tap. The code expires
    shortly. If you didn't request it, you can ignore this email.
  </p>
</div>
