
# Auth is a code-only (6-digit OTP) flow for email; Apple/Google use native
# id-tokens. The app never consumes a magic-link redirect (the Supabase client
# runs with detectSessionInUrl:false), so any tappable link in a sign-in email
# is a dead end: on a phone it lands on site_url and shows
# "This site can't be reached / ERR_CONNECTION_REFUSED". Keep site_url off
# localhost and keep the email templates code-only (see [auth.email.template.*]).
[auth]
# The mobile app has no web surface; point auth redirects at the app's deep-link
# scheme (declared as `ralb` in app.config.ts) rather than an unreachable localhost.
site_url = "ralb://auth-callback"
additional_redirect_urls = ["ralb://auth-callback"]
enable_manual_linking = true
# Anonymous sign-in was removed (real auth hard-gates the app; see CLAUDE.md).
enable_anonymous_sign_ins = false
minimum_password_length = 8
password_requirements = "lower_upper_letters_digits_symbols"

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_confirmations = true
max_frequency = "1m0s"
# Must match the app UI, which is hard-locked to a 6-digit code.
otp_length = 6

# Code-only email templates: omit the confirmation URL entirely and show only
# {{ .Token }}, so a tester types the code instead of tapping a link that dead-ends
# on site_url. Both templates are wired because signInWithOtp sends "Confirm signup"
# to brand-new users and "Magic Link" to returning ones.
[auth.email.template.magic_link]
subject = "Your RALB sign-in code"
content_path = "./templates/magic-link.html"

[auth.email.template.confirmation]
subject = "Your RALB sign-in code"
content_path = "./templates/magic-link.html"

[functions.remote-signing-complete]
enabled = true
verify_jwt = false
import_map = "./functions/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/remote-signing-complete/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/remote-signing-complete/*.html" ]

[functions.remote-signing-request]
enabled = true
verify_jwt = false
import_map = "./functions/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/remote-signing-request/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/remote-signing-request/*.html" ]

[functions.remote-signing-cancel]
enabled = true
verify_jwt = false
import_map = "./functions/deno.json"
entrypoint = "./functions/remote-signing-cancel/index.ts"
