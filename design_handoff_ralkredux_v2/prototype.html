<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>RALB — Interactive Prototype</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0c0c0e; }
  body { font-family: ui-sans-serif, system-ui, sans-serif; color: #fff; }
  #root { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
</style>
<link rel="stylesheet" href="src/styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="lib/ios-frame.jsx"></script>
<script type="text/babel" src="lib/tweaks-panel.jsx"></script>

<script type="text/babel" src="src/themes.jsx"></script>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/components.jsx"></script>
<script type="text/babel" src="src/screens-home.jsx"></script>
<script type="text/babel" src="src/screens-records.jsx"></script>
<script type="text/babel" src="src/screens-new.jsx"></script>
<script type="text/babel" src="src/screens-aux.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

<script type="text/babel">
function FitToViewport({ width = 390, height = 844, children, padding = 32 }) {
  const [scale, setScale] = React.useState(1);
  React.useLayoutEffect(() => {
    const f = () => {
      const sx = (window.innerWidth - padding * 2) / width;
      const sy = (window.innerHeight - padding * 2) / height;
      setScale(Math.min(sx, sy, 1.2));
    };
    f();
    window.addEventListener('resize', f);
    return () => window.removeEventListener('resize', f);
  }, [width, height, padding]);
  return (
    <div style={{ width: '100vw', height: '100vh', display: 'grid', placeItems: 'center', overflow: 'hidden' }}>
      <div style={{ width, height, transform: `scale(${scale})`, transformOrigin: 'center' }}>
        {children}
      </div>
    </div>
  );
}

function PrototypeStandalone() {
  const frameRef = React.useRef(null);
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "theme": "tungsten",
    "startScreen": "today"
  }/*EDITMODE-END*/;
  const tw = window.useTweaks ? window.useTweaks(TWEAK_DEFAULTS) : { values: TWEAK_DEFAULTS, setTweak: () => {} };

  return (
    <FitToViewport>
    <window.IOSDevice width={390} height={844} dark>
      <div ref={frameRef} style={{ width: '100%', height: '100%', background: 'var(--bg, #000)', position: 'relative' }}>
        <window.PrototypeApp
          initialTheme={tw.values.theme}
          startScreen={tw.values.startScreen}
          frameRef={frameRef}
          key={tw.values.theme + tw.values.startScreen}
        />
      </div>
      {window.TweaksPanel ? (
        <window.TweaksPanel title="Prototype">
          <window.TweakSection title="Theme">
            <window.TweakSelect
              label="Palette"
              value={tw.values.theme}
              options={window.THEME_ORDER.map((k) => ({ value: k, label: window.THEMES[k].name + ' · ' + window.THEMES[k].sub }))}
              onChange={(v) => tw.setTweak('theme', v)}
            />
          </window.TweakSection>
          <window.TweakSection title="Start screen">
            <window.TweakSelect
              label="Tab"
              value={tw.values.startScreen}
              options={[
                { value: 'today', label: 'Today' },
                { value: 'records', label: 'Records' },
                { value: 'gear', label: 'Gear' },
                { value: 'profile', label: 'Profile' },
              ]}
              onChange={(v) => tw.setTweak('startScreen', v)}
            />
          </window.TweakSection>
        </window.TweaksPanel>
      ) : null}
    </window.IOSDevice>
    </FitToViewport>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PrototypeStandalone />);
</script>
</body>
</html>
